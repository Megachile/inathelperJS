name: Run Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Opt into Node.js 24 for JS-based actions. checkout@v4 and setup-node@v4
# still run on Node 20, which is being forced to Node 24 starting June 2026.
# This silences the deprecation warning by opting in early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Generate coverage report
      run: npm run test:coverage
      continue-on-error: true